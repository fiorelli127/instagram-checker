<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Instagram Checker</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 20px;
}
button, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
pre {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>Instagram Checker</h2>

<input type="file" id="followers">
<input type="file" id="following">

<button onclick="analisar()">Analisar</button>

<pre id="saida"></pre>

<script>
async function analisar() {
  try {
    const f1 = document.getElementById("followers").files[0];
    const f2 = document.getElementById("following").files[0];

    if (!f1 || !f2) {
      alert("Selecione os arquivos");
      return;
    }

    const followersRaw = JSON.parse(await f1.text());
    const followingRaw = JSON.parse(await f2.text());

    // 🔥 followers (tratamento seguro)
    let followers = [];

    if (Array.isArray(followersRaw)) {
      followers = followersRaw.map(u => u.string_list_data?.[0]?.value).filter(Boolean);
    } else if (followersRaw.followers) {
      followers = followersRaw.followers.map(u => u.string_list_data?.[0]?.value).filter(Boolean);
    }

    // 🔥 following (padrão Instagram)
    let following = [];
    if (followingRaw.relationships_following) {
      following = followingRaw.relationships_following.map(
        u => u.string_list_data?.[0]?.value
      ).filter(Boolean);
    }

    const naoSeguem = following.filter(u => !followers.includes(u));

    document.getElementById("saida").innerText =
      naoSeguem.length ? naoSeguem.join("\n") : "Nenhum encontrado";

  } catch (e) {
    alert("Erro ao ler os arquivos");
    console.log(e);
  }
}
</script>

</body>
</html>
