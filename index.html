<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instagram Checker Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
}

button {
  background: #262626;
  color: white;
}

.search {
  margin-top: 15px;
}

.section {
  margin-top: 20px;
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
}

.count {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

.lista {
  background: #1a1a1a;
  border-radius: 12px;
  max-height: 200px;
  overflow-y: auto;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.item:hover {
  background: #2a2a2a;
}
</style>
</head>

<body>

<header>📊 Instagram Checker Pro</header>

<div class="container">

<input type="file" id="followers" multiple>
<input type="file" id="following">

<button onclick="analisar()">Analisar</button>

<input class="search" type="text" placeholder="Buscar usuário..." oninput="filtrar(this.value)">

<div class="section">
  <div class="title">❌ Não te seguem</div>
  <div class="count" id="count1"></div>
  <div id="naoSeguem" class="lista"></div>
</div>

<div class="section">
  <div class="title">⚠️ Você não segue</div>
  <div class="count" id="count2"></div>
  <div id="vcNaoSegue" class="lista"></div>
</div>

<div class="section">
  <div class="title">🔁 Mútuos</div>
  <div class="count" id="count3"></div>
  <div id="mutuos" class="lista"></div>
</div>

</div>

<script>
let dados = {
  naoSeguem: [],
  vcNaoSegue: [],
  mutuos: []
};

function limpar(lista) {
  return [...new Set(
    lista
      .filter(Boolean)
      .map(u => u.toLowerCase().trim())
  )];
}

function criarLista(arr, id) {
  const el = document.getElementById(id);
  el.innerHTML = "";

  arr.forEach(user => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = user;

    div.onclick = () => {
      window.open("https://instagram.com/" + user, "_blank");
    };

    el.appendChild(div);
  });
}

function atualizarUI() {
  criarLista(dados.naoSeguem, "naoSeguem");
  criarLista(dados.vcNaoSegue, "vcNaoSegue");
  criarLista(dados.mutuos, "mutuos");

  document.getElementById("count1").innerText = dados.naoSeguem.length + " pessoas";
  document.getElementById("count2").innerText = dados.vcNaoSegue.length + " pessoas";
  document.getElementById("count3").innerText = dados.mutuos.length + " pessoas";
}

function filtrar(texto) {
  texto = texto.toLowerCase();

  criarLista(dados.naoSeguem.filter(u => u.includes(texto)), "naoSeguem");
  criarLista(dados.vcNaoSegue.filter(u => u.includes(texto)), "vcNaoSegue");
  criarLista(dados.mutuos.filter(u => u.includes(texto)), "mutuos");
}

async function analisar() {
  try {
    const followersFiles = document.getElementById("followers").files;
    const followingFile = document.getElementById("following").files[0];

    if (followersFiles.length === 0 || !followingFile) {
      alert("Selecione os arquivos");
      return;
    }

    let followers = [];

    for (let file of followersFiles) {
      const data = JSON.parse(await file.text());

      if (Array.isArray(data)) {
        followers.push(...data.map(u => u.string_list_data?.[0]?.value));
      } else {
        Object.values(data).forEach(arr => {
          if (Array.isArray(arr)) {
            arr.forEach(u => {
              let val = u?.string_list_data?.[0]?.value;
              if (val) followers.push(val);
            });
          }
        });
      }
    }

    const followingRaw = JSON.parse(await followingFile.text());
    const following = followingRaw.relationships_following.map(u => u.title);

    followers = limpar(followers);
    let followingClean = limpar(following);

    const followersSet = new Set(followers);
    const followingSet = new Set(followingClean);

    dados.naoSeguem = followingClean.filter(u => !followersSet.has(u));
    dados.vcNaoSegue = followers.filter(u => !followingSet.has(u));
    dados.mutuos = followingClean.filter(u => followersSet.has(u));

    atualizarUI();

  } catch (e) {
    alert("Erro ao processar arquivos");
    console.log(e);
  }
}
</script>

</body>
</html>
