<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Instagram Checker</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.lista {
  margin-top: 10px;
  white-space: pre-wrap;
  background: #222;
  padding: 10px;
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<h2>Instagram Checker</h2>

<input type="file" id="followers">
<input type="file" id="following">

<button onclick="analisar()">Analisar</button>

<h3>❌ Não te seguem</h3>
<div id="naoSeguem" class="lista"></div>

<h3>⚠️ Você não segue</h3>
<div id="vcNaoSegue" class="lista"></div>

<h3>🔁 Mútuos</h3>
<div id="mutuos" class="lista"></div>

<script>
async function analisar() {
  try {
    const f1 = document.getElementById("followers").files[0];
    const f2 = document.getElementById("following").files[0];

    if (!f1 || !f2) {
      alert("Selecione os arquivos");
      return;
    }

    const followersRaw = JSON.parse(await f1.text());
    const followingRaw = JSON.parse(await f2.text());

    // 🔥 followers (formato correto)
    let followers = [];

    if (Array.isArray(followersRaw)) {
      followers = followersRaw.map(u => u.string_list_data[0].value);
    } else if (followersRaw) {
      // tenta pegar dentro de qualquer chave
      for (let key in followersRaw) {
        if (Array.isArray(followersRaw[key])) {
          followersRaw[key].forEach(u => {
            if (u.string_list_data) {
              followers.push(u.string_list_data[0].value);
            }
          });
        }
      }
    }

    // 🔥 following (sempre assim)
    const following = followingRaw.relationships_following.map(
      u => u.string_list_data[0].value
    );

    const followersSet = new Set(followers);
    const followingSet = new Set(following);

    const naoSeguem = following.filter(u => !followersSet.has(u));
    const vcNaoSegue = followers.filter(u => !followingSet.has(u));
    const mutuos = following.filter(u => followersSet.has(u));

    document.getElementById("naoSeguem").innerText =
      naoSeguem.length ? naoSeguem.join("\n") : "Nenhum";

    document.getElementById("vcNaoSegue").innerText =
      vcNaoSegue.length ? vcNaoSegue.join("\n") : "Nenhum";

    document.getElementById("mutuos").innerText =
      mutuos.length ? mutuos.join("\n") : "Nenhum";

  } catch (e) {
    alert("Erro ao ler arquivos");
    console.log(e);
  }
}
</script>

</body>
</html>
