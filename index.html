<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instagram Checker</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #222;
  color: white;
}

.section {
  margin-top: 20px;
}

.lista {
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>📊 Instagram Checker</h2>

<input type="file" id="followers">

  <div id="naoSeguem" class="lista"></div>
</div>

  <h3>⚠️ Você não segue</h3>
  <div id="vcNaoSegue" class="lista"></div>
</div>

<div class="section">
  <h3>🔁 Mútuos</h3>
  <div id="mutuos" class="lista"></div>
</div>
