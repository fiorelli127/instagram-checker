<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instagram Checker</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

button, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #222;
  color: white;
}

.section {
  margin-top: 20px;
}

h3 {
  margin-top: 20px;
  color: #ccc;
}

.lista {
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>📊 Instagram Checker</h2>

<input type="file" id="followers">
<input type="file" id="following">

<button onclick="analisar()">Analisar</button>

<div class="section">
  <h3>❌ Não te seguem de volta</h3>
  <div id="naoSeguem" class="lista"></div>
</div>

<div class="section">
  <h3>⚠️ Você não segue de volta</h3>
  <div id="vcNaoSegue" class="lista"></div>
</div>

<div class="section">
  <h3>🔁 Seguidores mútuos</h3>
  <div id="mutuos" class="lista"></div>
</div>

<script>
function extrairUsuarios(data) {
  let usuarios = [];

  if (Array.isArray(data)) {
    data.forEach(u => {
      let val = u?.string_list_data?.[0]?.value;
      if (val) usuarios.push(val);
    });
  } else {
    for (let key in data) {
      if (Array.isArray(data[key])) {
        data[key].forEach(u => {
          let val = u?.string_list_data?.[0]?.value;
          if (val) usuarios.push(val);
        });
      }
    }
  }

  return usuarios;
}

async function analisar() {
  const followersFile = document.getElementById('followers').files[0];
  const followingFile = document.getElementById('following').files[0];

  if (!followersFile || !followingFile) {
    alert("Selecione os dois arquivos!");
    return;
  }

  const followersData = JSON.parse(await followersFile.text());
  const followingData = JSON.parse(await followingFile.text());

  const followers = extrairUsuarios(followersData);
  const following = extrairUsuarios(followingData);

  const followersSet = new Set(followers);
  const followingSet = new Set(following);

  const naoSeguem = following.filter(u => !followersSet.has(u));
  const vcNaoSegue = followers.filter(u => !followingSet.has(u));
  const mutuos = following.filter(u => followersSet.has(u));

  document.getElementById("naoSeguem").innerText = naoSeguem.join("\n") || "Nenhum";
  document.getElementById("vcNaoSegue").innerText = vcNaoSegue.join("\n") || "Nenhum";
  document.getElementById("mutuos").innerText = mutuos.join("\n") || "Nenhum";
}
</script>

</body>
</html>
