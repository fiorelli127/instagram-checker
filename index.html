<script>
let lista = [];

async function analisar() {
  const followersFile = document.getElementById('followers').files[0];
  const followingFile = document.getElementById('following').files[0];

  if (!followersFile || !followingFile) {
    alert("Selecione os dois arquivos!");
    return;
  }

  const followersData = JSON.parse(await followersFile.text());
  const followingData = JSON.parse(await followingFile.text());

  function extrairUsuarios(data) {
    let usuarios = [];

    if (Array.isArray(data)) {
      usuarios = data.map(u => u?.string_list_data?.[0]?.value).filter(Boolean);
    } else {
      for (let key in data) {
        if (Array.isArray(data[key])) {
          data[key].forEach(item => {
            let user = item?.string_list_data?.[0]?.value;
            if (user) usuarios.push(user);
          });
        }
      }
    }

    return usuarios;
  }

  const followers = extrairUsuarios(followersData);
  const following = extrairUsuarios(followingData);

  const followersSet = new Set(followers);
  lista = following.filter(u => !followersSet.has(u));

  mostrar(lista);
}

function mostrar(arr) {
  document.getElementById("resultado").innerText = arr.length ? arr.join("\n") : "Nenhum encontrado";
  document.getElementById("contador").innerText =
    `❌ ${arr.length} pessoas não te seguem`;
}

function filtrar() {
  const termo = document.getElementById("search").value.toLowerCase();
  const filtrado = lista.filter(u => u.toLowerCase().includes(termo));
  mostrar(filtrado);
}

function copiar() {
  navigator.clipboard.writeText(lista.join("\n"));
  alert("Lista copiada!");
}
</script>
