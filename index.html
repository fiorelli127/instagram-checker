<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Analyzer Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.container {
  padding: 15px;
}

.card {
  background: #1f1f1f;
  border-radius: 15px;
  padding: 15px;
  margin-top: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #262626;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

.lista {
  max-height: 200px;
  overflow-y: auto;
  background: #141414;
  border-radius: 10px;
  margin-top: 10px;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.item:hover {
  background: #2a2a2a;
}

.count {
  font-size: 12px;
  color: #aaa;
}

.search {
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h2>🔥 Instagram Analyzer Pro</h2>
  <p>Descubra quem deixou de te seguir</p>
</header>

<div class="container">

<div class="card">
  <b>1️⃣ Baixar dados</b>
  <button onclick="abrirDownload()">Abrir Instagram</button>
</div>

<div class="card">
  <b>2️⃣ Enviar arquivos</b>
  <input type="file" id="followers" multiple>
  <input type="file" id="following">
  <button onclick="analisar()">Analisar</button>
</div>

<input class="search" type="text" placeholder="Buscar..." oninput="filtrar(this.value)">

<div class="card">
  🔥 Pararam de te seguir
  <div class="count" id="lostCount"></div>
  <div id="lost" class="lista"></div>
</div>

<div class="card">
  ❌ Não te seguem
  <div class="count" id="c1"></div>
  <div id="naoSeguem" class="lista"></div>
</div>

<div class="card">
  ⚠️ Você não segue
  <div class="count" id="c2"></div>
  <div id="vcNaoSegue" class="lista"></div>
</div>

<div class="card">
  🔁 Mútuos
  <div class="count" id="c3"></div>
  <div id="mutuos" class="lista"></div>
</div>

</div>

<script>
let dados = { naoSeguem: [], vcNaoSegue: [], mutuos: [], lost: [] };

function abrirDownload() {
  window.open("https://www.instagram.com/download/request/", "_blank");
}

function limpar(lista) {
  return [...new Set(
    lista
      .filter(u => typeof u === "string")
      .map(u => u.toLowerCase().trim().replace("@",""))
  )];
}

function criarLista(arr, id) {
  const el = document.getElementById(id);
  el.innerHTML = "";

  arr.forEach(user => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = user;

    div.onclick = () => {
      window.open("https://instagram.com/" + user, "_blank");
    };

    el.appendChild(div);
  });
}

function atualizarUI() {
  criarLista(dados.naoSeguem, "naoSeguem");
  criarLista(dados.vcNaoSegue, "vcNaoSegue");
  criarLista(dados.mutuos, "mutuos");
  criarLista(dados.lost, "lost");

  c1.innerText = dados.naoSeguem.length + " pessoas";
  c2.innerText = dados.vcNaoSegue.length + " pessoas";
  c3.innerText = dados.mutuos.length + " pessoas";
  lostCount.innerText = dados.lost.length + " pessoas";
}

function filtrar(txt) {
  txt = txt.toLowerCase();

  criarLista(dados.naoSeguem.filter(u => u.includes(txt)), "naoSeguem");
  criarLista(dados.vcNaoSegue.filter(u => u.includes(txt)), "vcNaoSegue");
  criarLista(dados.mutuos.filter(u => u.includes(txt)), "mutuos");
  criarLista(dados.lost.filter(u => u.includes(txt)), "lost");
}

async function analisar() {
  try {
    const followersFiles = document.getElementById("followers").files;
    const followingFile = document.getElementById("following").files[0];

    if (followersFiles.length === 0 || !followingFile) {
      alert("Selecione os arquivos");
      return;
    }

    let followers = [];

    for (let file of followersFiles) {
      const data = JSON.parse(await file.text());

      if (Array.isArray(data)) {
        followers.push(...data.map(u => u.string_list_data?.[0]?.value));
      } else {
        Object.values(data).forEach(arr => {
          if (Array.isArray(arr)) {
            arr.forEach(u => {
              let val = u?.string_list_data?.[0]?.value;
              if (val) followers.push(val);
            });
          }
        });
      }
    }

    const followingRaw = JSON.parse(await followingFile.text());
    const following = followingRaw.relationships_following.map(u => u.title);

    followers = limpar(followers);
    let followingClean = limpar(following);

    const followersSet = new Set(followers);
    const followingSet = new Set(followingClean);

    const novosMutuos = [...followersSet].filter(u => followingSet.has(u));
    const naoSeguem = [...followingSet].filter(u => !followersSet.has(u));
    const vcNaoSegue = [...followersSet].filter(u => !followingSet.has(u));

    // 🔥 HISTÓRICO (nível hacker)
    let antigos = JSON.parse(localStorage.getItem("mutuos_antigos") || "[]");

    dados.lost = antigos.filter(u => !novosMutuos.includes(u));

    // salva estado atual
    localStorage.setItem("mutuos_antigos", JSON.stringify(novosMutuos));

    dados.mutuos = novosMutuos;
    dados.naoSeguem = naoSeguem;
    dados.vcNaoSegue = vcNaoSegue;

    atualizarUI();

  } catch (e) {
    alert("Erro ao processar arquivos");
    console.log(e);
  }
}
</script>

</body>
</html>
