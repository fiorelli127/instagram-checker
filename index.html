<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Instagram Checker</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 20px;
}
button, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Instagram Checker</h2>

<input type="file" id="followers">
<input type="file" id="following">

<button id="btn">Analisar</button>

<pre id="saida"></pre>

<script>
document.getElementById("btn").addEventListener("click", async function () {

  try {
    const f1 = document.getElementById("followers").files[0];
    const f2 = document.getElementById("following").files[0];

    if (!f1 || !f2) {
      alert("Selecione os arquivos");
      return;
    }

    const dataFollowers = JSON.parse(await f1.text());
    const dataFollowing = JSON.parse(await f2.text());

    function extrairUsuarios(obj) {
      let lista = [];

      function procurar(item) {
        if (Array.isArray(item)) {
          item.forEach(procurar);
        } else if (typeof item === "object" && item !== null) {
          if (item.string_list_data) {
            item.string_list_data.forEach(s => {
              if (s.value) lista.push(s.value);
            });
          }
          for (let key in item) {
            procurar(item[key]);
          }
        }
      }

      procurar(obj);
      return lista;
    }

    const followers = extrairUsuarios(dataFollowers);
    const following = extrairUsuarios(dataFollowing);

    const naoSeguem = following.filter(u => !followers.includes(u));

    document.getElementById("saida").innerText =
      "Não te seguem:\n\n" + (naoSeguem.length ? naoSeguem.join("\n") : "Nenhum");

  } catch (e) {
    alert("Erro ao ler os arquivos");
    console.log(e);
  }

});
</script>

</body>
</html>
